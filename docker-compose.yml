version: '3.8'
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build: ./backend
    container_name: finsentinel-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - NEWS_API_KEY=${NEWS_API_KEY}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - ./data:/app/data

  price_worker:
    build: ./backend
    command: ["python", "app/workers/price_worker.py"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - ./data:/app/data

  price_ws_worker:
    build: ./backend
    command: ["python", "app/workers/price_ws_worker.py"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ALPHA_VANTAGE_WS=${ALPHA_VANTAGE_WS}
      - PRICE_POLL_INTERVAL=60
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - ./data:/app/data

  news_worker:
    build: ./backend
    command: ["python", "app/workers/news_worker.py"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - NEWS_API_KEY=${NEWS_API_KEY}
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - ./data:/app/data

  social_worker:
    build: ./backend
    command: ["python", "app/workers/social_worker.py"]
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - ./data:/app/data

volumes:
  redis-data:
